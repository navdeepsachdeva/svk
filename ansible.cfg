[defaults]
inventory=./svk_inventory
remote_user=devops
gathering=explicit
roles_path=./roles:/usr/share/ansible/roles:/etc/ansible/roles
collections_path=./collections:/home/student/.ansible/collections:/usr/share/ansible/collections


[privilege_escalation]
become=false
become_method=ansible.builtin.sudo
become_user=root
become_ask_pass=False
